name: CI (Docker identical)

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Speeds up image build (optional but helps a lot)
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build + start stack
        run: |
          docker buildx create --use
          make ci-up

      - name: Install deps + migrate
        run: make ci-setup

      - name: Run checks (same as local)
        run: make ci-check

      - name: Tear down
        if: always()
        run: make ci-down

  deploy:
    needs: docker-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/app/setup
            git pull origin main
            DOMAIN=ruslanrahimov.space \
            PGADMIN_DOMAIN=pgadmin.ruslanrahimov.space \
            bash scripts/deploy.sh --env /opt/app/.env